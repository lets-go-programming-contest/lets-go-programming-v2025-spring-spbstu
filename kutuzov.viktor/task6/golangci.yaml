run:
  timeout: 5m
  tests: false

output:
   formats: 
    - format: tab

linters-settings:
  exhaustive:
    default-signifies-exhaustive: true
    
linters:
  enable:
    - govet
    - revive
    - errcheck
    - gosimple
    - godot
    - ineffassign
    - staticcheck
    - typecheck
    - unused
    - bidichk
    - durationcheck
    - exhaustive
    - gofmt
    - goimports
    - misspell
    - predeclared
    - reassign
    - whitespace
  disable-all: true
  fast: false